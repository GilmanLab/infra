machine:
  certSANs:
    - platform.mgmt.lab.gilman.io
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: platform.mgmt.lab.gilman.io
auto: off
---
apiVersion: v1alpha1
kind: LinkAliasConfig
name: net0
selector:
  match: true
---
apiVersion: v1alpha1
kind: LinkConfig
name: net0
up: true
---
apiVersion: v1alpha1
kind: VLANConfig
name: net0.10
vlanID: 10
parent: net0
up: true
addresses:
  - address: 10.10.10.10/24
routes:
  - gateway: 10.10.10.1
---
apiVersion: v1alpha1
kind: ResolverConfig
nameservers:
  - address: 10.10.10.1
