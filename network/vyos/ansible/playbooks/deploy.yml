# VyOS Configuration Deployment Playbook
# Applies gateway.conf to the router, stages runtime assets, reconciles
# authoritative DNS state via the local PowerDNS API, and verifies edge
# containers.
#
# Usage:
#   ansible-playbook deploy.yml -i ../inventory/hosts.yml
#
# Environment Variables:
#   VYOS_HOST         - VyOS hostname or IP (default: 10.0.0.2)
#   VYOS_SSH_KEY      - Path to SSH private key for connection (default: ~/.ssh/vyos-gateway)
#   GLAB_SECRETS_DIR  - Path to the shared secrets repo (default: sibling ../secrets)
#
# Safety:
#   - Uses VyOS native `load` command instead of vyos_config because the Ansible
#     module doesn't properly parse bracket format with comments.
#   - Candidate config is committed and saved only after runtime assets are in place.
#   - Local rendered secret material is staged in a temporary directory and removed
#     at the end of the run.
---
- name: Deploy VyOS configuration and edge services
  hosts: vyos_gateway
  gather_facts: false
  vars_files:
    - ../vars/bootstrap_k0s.yml
    - ../vars/coredns.yml
    - ../vars/powerdns.yml
    - ../vars/tailscale.yml

  vars:
    secrets_dir: "{{ lookup('env', 'GLAB_SECRETS_DIR') | default(playbook_dir ~ '/../../../../../secrets', true) }}"
    config_file: "{{ playbook_dir }}/../../configs/gateway.conf"
    ssh_sops_file: "{{ secrets_dir }}/network/vyos/ssh.sops.yaml"
    pdns_sops_file: "{{ secrets_dir }}/network/vyos/dns/powerdns.sops.yaml"
    tailscale_sops_file: "{{ secrets_dir }}/network/vyos/tailscale.sops.yaml"
    backup_dir: "{{ playbook_dir }}/../../backups"
    remote_config_path: /tmp/gateway.conf
    remote_pdns_conf_path: /config/containers/pdns-auth/pdns.conf
    remote_pdns_state_path: /config/containers/pdns-auth/desired-state.json
    remote_pdns_data_dir: /config/containers/pdns-auth/data
    remote_pdns_script_path: /config/scripts/pdns-reconcile.py
    remote_coredns_conf_path: "{{ coredns_conf_path }}"
    remote_coredns_zone_dir: "{{ coredns_zone_dir }}"
    remote_dns_mirror_fetch_script_path: "{{ dns_mirror_fetch_script_path }}"
    remote_bootstrap_k0s_env_path: "{{ bootstrap_k0s_env_path }}"
    remote_bootstrap_k0s_data_dir: "{{ bootstrap_k0s_data_dir }}"
    remote_bootstrap_k0s_pods_dir: "{{ bootstrap_k0s_pods_dir }}"
    remote_bootstrap_k0s_service_path: "{{ bootstrap_k0s_systemd_unit_path }}"
    remote_incusos_artifacts_dir: "{{ incusos_artifacts_dir }}"
    remote_stage_dir: /tmp
    tsig_secret_placeholder: "__VYOS_DHCP_TSIG_SECRET__"
    tailscale_authkey_placeholder: "__TAILSCALE_AUTHKEY__"
    pdns_reconcile_script_source: "{{ playbook_dir }}/../files/pdns-reconcile.py"

  tasks:
    - name: Ensure local backup directory exists
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0755"

    - name: Get current configuration
      vyos.vyos.vyos_command:
        commands:
          - show configuration
      register: current_config

    - name: Backup current configuration
      delegate_to: localhost
      ansible.builtin.copy:
        content: "{{ current_config.stdout[0] }}"
        dest: "{{ backup_dir }}/gateway-{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}.conf"
        mode: "0644"

    - name: Create local render directory
      delegate_to: localhost
      ansible.builtin.tempfile:
        state: directory
        prefix: vyos-dns-deploy-
      register: render_dir

    - name: Set local render paths
      ansible.builtin.set_fact:
        rendered_config_file: "{{ render_dir.path }}/gateway.conf"
        rendered_coredns_corefile: "{{ render_dir.path }}/Corefile"
        rendered_dns_mirror_fetch_script: "{{ render_dir.path }}/dns-mirror-fetch-glab-lol.sh"
        rendered_pdns_conf_file: "{{ render_dir.path }}/pdns.conf"
        rendered_pdns_state_file: "{{ render_dir.path }}/desired-state.json"
        rendered_bootstrap_k0s_env_file: "{{ render_dir.path }}/bootstrap-k0s.env"
        rendered_bootstrap_k0s_service_file: "{{ render_dir.path }}/bootstrap-k0s.service"

    - name: Decrypt SSH credentials from SOPS
      delegate_to: localhost
      ansible.builtin.command:
        cmd: sops -d "{{ ssh_sops_file }}"
      register: ssh_sops_output
      changed_when: false
      no_log: true

    - name: Parse SSH credentials
      delegate_to: localhost
      ansible.builtin.set_fact:
        ssh_credentials: "{{ ssh_sops_output.stdout | from_yaml }}"
      no_log: true

    - name: Extract SSH key components
      delegate_to: localhost
      ansible.builtin.set_fact:
        ssh_key_type: "{{ ssh_credentials.public_key.split()[0] }}"
        ssh_key_data: "{{ ssh_credentials.public_key.split()[1] }}"
        ssh_password: "{{ ssh_credentials.password }}"
      no_log: true

    - name: Decrypt PowerDNS credentials from SOPS
      delegate_to: localhost
      ansible.builtin.command:
        cmd: sops -d "{{ pdns_sops_file }}"
      register: pdns_sops_output
      changed_when: false
      no_log: true

    - name: Parse PowerDNS credentials
      delegate_to: localhost
      ansible.builtin.set_fact:
        pdns_credentials: "{{ pdns_sops_output.stdout | from_yaml }}"
      no_log: true

    - name: Decrypt Tailscale credentials from SOPS
      delegate_to: localhost
      ansible.builtin.command:
        cmd: sops -d "{{ tailscale_sops_file }}"
      register: tailscale_sops_output
      changed_when: false
      no_log: true

    - name: Parse Tailscale credentials
      delegate_to: localhost
      ansible.builtin.set_fact:
        tailscale_credentials: "{{ tailscale_sops_output.stdout | from_yaml }}"
      no_log: true

    - name: Assert required Tailscale SOPS keys are present
      delegate_to: localhost
      ansible.builtin.assert:
        that:
          - tailscale_credentials.oauth_client_secret is defined
          - tailscale_credentials.oauth_client_secret | length > 0
        fail_msg: >-
          tailscale.sops.yaml is missing oauth_client_secret. Create a
          Tailscale OAuth client scoped to {{ tailscale_tag }} with auth_keys
          write permission and store its secret under network/vyos.
      no_log: true

    - name: Build rendered PowerDNS desired state
      ansible.builtin.set_fact:
        pdns_desired_state_rendered: >-
          {{
            pdns_desired_state
            | combine(
                {
                  'tsig_keys': [
                    {
                      'name': pdns_credentials.tsig_keys.vyos_dhcp.name,
                      'algorithm': pdns_credentials.tsig_keys.vyos_dhcp.algorithm,
                      'key': pdns_credentials.tsig_keys.vyos_dhcp.secret
                    },
                    {
                      'name': pdns_credentials.tsig_keys.externaldns_platform.name,
                      'algorithm': pdns_credentials.tsig_keys.externaldns_platform.algorithm,
                      'key': pdns_credentials.tsig_keys.externaldns_platform.secret
                    }
                  ]
                },
                recursive=True
              )
          }}
      no_log: true

    - name: Read gateway configuration
      delegate_to: localhost
      ansible.builtin.slurp:
        src: "{{ config_file }}"
      register: config_content

    - name: Render gateway configuration with injected credentials
      delegate_to: localhost
      vars:
        auth_placeholder: "        user vyos {\n            authentication {\n                /* SSH public keys added by Ansible deploy.yml */\n                /* Password set manually for console access */\n            }\n        }"
        auth_with_credentials: "        user vyos {\n            authentication {\n                plaintext-password \"{{ ssh_password }}\"\n                public-keys vyos-gateway {\n                    key {{ ssh_key_data }}\n                    type {{ ssh_key_type }}\n                }\n            }\n        }"
      ansible.builtin.copy:
        content: >-
          {{
            (config_content.content | b64decode)
            | replace(auth_placeholder, auth_with_credentials)
            | replace(tsig_secret_placeholder, pdns_credentials.tsig_keys.vyos_dhcp.secret)
            | replace(tailscale_authkey_placeholder, tailscale_credentials.oauth_client_secret ~ '?ephemeral=false&preauthorized=true')
          }}
        dest: "{{ rendered_config_file }}"
        mode: "0600"
      no_log: true

    - name: Render PowerDNS configuration
      delegate_to: localhost
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/pdns.conf.j2"
        dest: "{{ rendered_pdns_conf_file }}"
        mode: "0600"
      no_log: true

    - name: Render PowerDNS desired state
      delegate_to: localhost
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/pdns-desired-state.json.j2"
        dest: "{{ rendered_pdns_state_file }}"
        mode: "0600"
      no_log: true

    - name: Render CoreDNS configuration
      delegate_to: localhost
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/coredns.Corefile.j2"
        dest: "{{ rendered_coredns_corefile }}"
        mode: "0644"

    - name: Render dns-mirror fetch script
      delegate_to: localhost
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/dns-mirror-fetch-glab-lol.sh.j2"
        dest: "{{ rendered_dns_mirror_fetch_script }}"
        mode: "0755"

    - name: Render bootstrap-k0s environment file
      delegate_to: localhost
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/bootstrap-k0s.env.j2"
        dest: "{{ rendered_bootstrap_k0s_env_file }}"
        mode: "0600"

    - name: Render bootstrap-k0s systemd unit
      delegate_to: localhost
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/bootstrap-k0s.service.j2"
        dest: "{{ rendered_bootstrap_k0s_service_file }}"
        mode: "0644"

    - name: Stage runtime files on router
      block:
        - name: Copy configuration and runtime assets to router staging
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - scp
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ rendered_config_file }}"
              - "{{ rendered_pdns_conf_file }}"
              - "{{ rendered_pdns_state_file }}"
              - "{{ rendered_coredns_corefile }}"
              - "{{ rendered_dns_mirror_fetch_script }}"
              - "{{ rendered_bootstrap_k0s_env_file }}"
              - "{{ rendered_bootstrap_k0s_service_file }}"
              - "{{ pdns_reconcile_script_source }}"
              - "{{ ansible_user }}@{{ ansible_host }}:{{ remote_stage_dir }}/"
          no_log: true

        - name: Install Tailscale runtime assets on router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - >-
                sudo install -d -m 0750 /config/containers/tailscale &&
                sudo install -d -m 0700 {{ tailscale_state_dir }}
          no_log: true

        - name: Install PowerDNS runtime assets on router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - >-
                sudo install -d -m 0750 /config/containers/pdns-auth /config/scripts &&
                sudo install -d -o 953 -g 953 -m 0750 {{ remote_pdns_data_dir }} &&
                sudo install -o 953 -g 953 -m 0640 {{ remote_stage_dir }}/pdns.conf {{ remote_pdns_conf_path }} &&
                sudo install -m 0600 {{ remote_stage_dir }}/desired-state.json {{ remote_pdns_state_path }} &&
                sudo install -m 0750 {{ remote_stage_dir }}/pdns-reconcile.py {{ remote_pdns_script_path }}
          no_log: true

        - name: Install CoreDNS runtime assets on router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - >-
                sudo install -d -m 0750 /config/containers/coredns /config/scripts &&
                sudo install -d -m 0755 {{ remote_coredns_zone_dir }} &&
                sudo install -m 0644 {{ remote_stage_dir }}/Corefile {{ remote_coredns_conf_path }} &&
                sudo install -m 0755 {{ remote_stage_dir }}/dns-mirror-fetch-glab-lol.sh {{ remote_dns_mirror_fetch_script_path }}

        - name: Install bootstrap-k0s runtime assets on router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - >-
                sudo install -d -m 0755 /config/containers/bootstrap-k0s /config/scripts &&
                sudo install -d -m 0755 {{ remote_bootstrap_k0s_data_dir }} {{ remote_bootstrap_k0s_pods_dir }} {{ remote_incusos_artifacts_dir }} &&
                sudo install -m 0600 {{ remote_stage_dir }}/bootstrap-k0s.env {{ remote_bootstrap_k0s_env_path }} &&
                sudo install -m 0644 {{ remote_stage_dir }}/bootstrap-k0s.service {{ remote_bootstrap_k0s_service_path }}

        - name: Pre-pull PowerDNS image on router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "sudo podman pull {{ pdns_image }}"
          register: pdns_image_pull
          changed_when: "'Downloaded' in pdns_image_pull.stdout or 'Copying blob' in pdns_image_pull.stdout or 'Writing manifest' in pdns_image_pull.stdout or 'Storing signatures' in pdns_image_pull.stdout"

        - name: Pre-pull CoreDNS image on router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "sudo podman pull {{ coredns_image }}"
          register: coredns_image_pull
          changed_when: "'Downloaded' in coredns_image_pull.stdout or 'Copying blob' in coredns_image_pull.stdout or 'Writing manifest' in coredns_image_pull.stdout or 'Storing signatures' in coredns_image_pull.stdout"

        - name: Pre-pull dns-mirror image on router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "sudo podman pull {{ dns_mirror_image }}"
          register: dns_mirror_image_pull
          changed_when: "'Downloaded' in dns_mirror_image_pull.stdout or 'Copying blob' in dns_mirror_image_pull.stdout or 'Writing manifest' in dns_mirror_image_pull.stdout or 'Storing signatures' in dns_mirror_image_pull.stdout"

        - name: Pre-pull Tailscale image on router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "sudo podman pull {{ tailscale_image }}"
          register: tailscale_image_pull
          changed_when: "'Downloaded' in tailscale_image_pull.stdout or 'Copying blob' in tailscale_image_pull.stdout or 'Writing manifest' in tailscale_image_pull.stdout or 'Storing signatures' in tailscale_image_pull.stdout"

        - name: Pre-pull IncusOS artifacts image on router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "sudo podman pull {{ incusos_artifacts_image }}"
          register: incusos_artifacts_image_pull
          changed_when: "'Downloaded' in incusos_artifacts_image_pull.stdout or 'Copying blob' in incusos_artifacts_image_pull.stdout or 'Writing manifest' in incusos_artifacts_image_pull.stdout or 'Storing signatures' in incusos_artifacts_image_pull.stdout"

        - name: Pre-pull bootstrap-k0s image on router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "sudo podman pull {{ bootstrap_k0s_image }}"
          register: bootstrap_k0s_image_pull
          changed_when: "'Downloaded' in bootstrap_k0s_image_pull.stdout or 'Copying blob' in bootstrap_k0s_image_pull.stdout or 'Writing manifest' in bootstrap_k0s_image_pull.stdout or 'Storing signatures' in bootstrap_k0s_image_pull.stdout"

        - name: Fetch initial glab.lol zonefile on router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "sudo {{ remote_dns_mirror_fetch_script_path }}"

        - name: Ensure IPv4 raw nftables chains exist before interface commit
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - >-
                sudo nft list chain ip raw VYOS_TCP_MSS >/dev/null 2>&1 ||
                sudo nft 'add chain ip raw VYOS_TCP_MSS { type filter hook postrouting priority raw; policy accept; }';
                sudo nft list chain ip raw vyos_rpfilter >/dev/null 2>&1 ||
                sudo nft 'add chain ip raw vyos_rpfilter { type filter hook prerouting priority raw; policy accept; }'
          changed_when: false

        - name: Load, commit, and save configuration
          vyos.vyos.vyos_command:
            commands:
              - configure
              - "load {{ remote_config_path }}"
              - commit
              - save
              - exit
          vars:
            ansible_command_timeout: 300

        - name: Verify connectivity after config change
          ansible.builtin.wait_for_connection:
            delay: 5
            timeout: 90

        - name: Reload and start bootstrap-k0s service
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - >-
                sudo systemctl daemon-reload &&
                sudo systemctl enable --now bootstrap-k0s.service

        - name: Verify IncusOS artifact server responds on LAB_PROV
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "curl -fsSI http://{{ bootstrap_k0s_provisioning_ip }}:{{ incusos_artifacts_port }}/"
          register: incusos_artifact_server_ready
          retries: 12
          delay: 5
          until: incusos_artifact_server_ready.rc == 0

        - name: Verify bootstrap-k0s service is active
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "sudo systemctl is-active --quiet bootstrap-k0s.service"

        - name: Remove stale step-ca runtime data from router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - >-
                sudo rm -rf /config/containers/stepca
                {{ remote_stage_dir }}/ca.json
                {{ remote_stage_dir }}/intermediate_ca_key
                {{ remote_stage_dir }}/intermediate_ca_pw
                {{ remote_stage_dir }}/root_ca.crt
                {{ remote_stage_dir }}/intermediate_ca.crt
          changed_when: false

        - name: Wait for PowerDNS API to become healthy
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - >-
                curl -fsS -H "X-API-Key: {{ pdns_credentials.api_key }}"
                {{ pdns_api_url }}/servers/localhost
          register: pdns_api_ready
          retries: 30
          delay: 5
          until: pdns_api_ready.rc == 0
          no_log: true

        - name: Reconcile PowerDNS desired state
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - >-
                sudo env PDNS_API_KEY={{ pdns_credentials.api_key | quote }}
                PDNS_API_URL={{ pdns_api_url | quote }}
                python3 {{ remote_pdns_script_path }} {{ remote_pdns_state_path }}
          no_log: true

        - name: Wait for Tailscale subnet router to become ready
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "sudo podman exec tailscale tailscale status --json"
          register: tailscale_status
          retries: 30
          delay: 5
          until: tailscale_status.rc == 0 and tailscale_hostname in tailscale_status.stdout
          no_log: true

        - name: Apply Tailscale site-to-site routing preferences
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "sudo podman exec tailscale tailscale set --accept-routes --snat-subnet-routes=false"
          changed_when: false

        - name: Verify CoreDNS serves glab.lol directly
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - dig
              - "+time=2"
              - "+tries=1"
              - "@{{ coredns_service_ip }}"
              - glab.lol
              - SOA
          register: coredns_glab_lol
          retries: 30
          delay: 5
          until:
            - coredns_glab_lol.rc == 0
            - "'status: NOERROR' in coredns_glab_lol.stdout"
            - "'ANSWER: 1' in coredns_glab_lol.stdout"

        - name: Verify VyOS forwards glab.lol to CoreDNS
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - dig
              - "+time=2"
              - "+tries=1"
              - "@10.10.10.1"
              - glab.lol
              - SOA
          register: vyos_glab_lol
          retries: 30
          delay: 5
          until:
            - vyos_glab_lol.rc == 0
            - "'status: NOERROR' in vyos_glab_lol.stdout"
            - "'ANSWER: 1' in vyos_glab_lol.stdout"

        - name: Verify Tailscale advertised routes
          ansible.builtin.assert:
            that:
              - item in tailscale_status.stdout
            fail_msg: "Tailscale status did not include advertised route {{ item }}"
          loop: "{{ tailscale_routes }}"

        - name: Deployment complete
          ansible.builtin.debug:
            msg: "VyOS configuration and edge services deployed successfully"
      always:
        - name: Remove staged files from router
          delegate_to: localhost
          ansible.builtin.command:
            argv:
              - ssh
              - -i
              - "{{ ansible_ssh_private_key_file }}"
              - -o
              - StrictHostKeyChecking=no
              - -o
              - UserKnownHostsFile=/dev/null
              - "{{ ansible_user }}@{{ ansible_host }}"
              - "rm -f {{ remote_config_path }} {{ remote_stage_dir }}/pdns.conf {{ remote_stage_dir }}/desired-state.json {{ remote_stage_dir }}/pdns-reconcile.py {{ remote_stage_dir }}/Corefile {{ remote_stage_dir }}/dns-mirror-fetch-glab-lol.sh {{ remote_stage_dir }}/bootstrap-k0s.env {{ remote_stage_dir }}/bootstrap-k0s.service"
          ignore_errors: true
          no_log: true

        - name: Remove local render directory
          delegate_to: localhost
          ansible.builtin.file:
            path: "{{ render_dir.path }}"
            state: absent
          ignore_errors: true
