layer: 'application'
tags:
  - 'aws'
  - 'tofu'

project:
  title: 'AWS lab foundation'
  description: 'OpenTofu stack for the base network, DNS, and KMS primitives in the lab AWS account.'
  owner: 'GilmanLab'
  maintainers:
    - 'josh'

tasks:
  check:
    command: './scripts/check.sh'
    toolchains: 'system'
    inputs:
      - '*.tf'
      - '*.tfvars'
      - '.terraform.lock.hcl'
      - 'scripts/check.sh'
      - 'tests/**/*.tftest.hcl'
    options:
      cache: false
      runInCI: true
