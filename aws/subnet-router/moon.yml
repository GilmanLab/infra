layer: 'application'
tags:
  - 'aws'
  - 'tofu'

project:
  title: 'AWS subnet router'
  description: 'OpenTofu stack for the AWS EC2 subnet router that joins Tailscale through AWS workload identity federation.'
  owner: 'GilmanLab'
  maintainers:
    - 'josh'

tasks:
  check:
    command: './scripts/check.sh'
    toolchains: 'system'
    inputs:
      - '*.tf'
      - '*.tfvars'
      - '.terraform.lock.hcl'
      - 'scripts/check.sh'
      - 'templates/**/*.tftpl'
    options:
      cache: false
      runInCI: true
