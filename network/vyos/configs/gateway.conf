/* VyOS Gateway Configuration
 * Target: VP6630 (Minisforum) - Lab Gateway Router
 *
 * This is the source of truth for VyOS configuration.
 * Applied via Ansible on merge to main branch.
 *
 * Interface Mapping:
 *   WAN_IFACE   = eth0  (Top SFP+ -> CCR2004 DOWNLINK)
 *   TRUNK_IFACE = eth1  (Bottom SFP+ -> CRS Switch)
 *   LAN_IFACES  = eth2-eth5 (2.5GbE LAN ports)
 *
 * Transit Link (eth0 <-> CCR2004):
 *   10.0.0.0/30 - Point-to-point between lab and home routers
 *   VyOS:   10.0.0.2/30
 *   CCR2004: 10.0.0.1/30
 *
 * Home Network: 192.168.1.0/24 (routed via transit link)
 *
 * Lab Network Architecture:
 *   10 - LAB_MGMT     (10.10.10.0/24) - Management + platform
 *   20 - LAB_PROV     (10.10.20.0/24) - Provisioning (PXE)
 *   40 - LAB_WORKLOAD (10.10.40.0/24) - Workload / VM network
 *   access - LAB_OOB  (10.10.70.0/24) - MS-02 AMT/OOB access switch on eth5
 *
 * Bridge Architecture:
 *   br10 - Bridges eth1.10 (switch trunk) and eth2.10 (UM760 direct connect)
 *          for steady-state UM760 management/platform access.
 *   br20 - Bridges eth1.20 (switch trunk) and, temporarily, physical eth2
 *          while provisioning the UM760 via untagged PXE/Tinkerbell.
 */

firewall {
    group {
        network-group HOME_NETWORK {
            network 192.168.1.0/24
        }
        network-group TRANSIT_LINK {
            network 10.0.0.0/30
        }
        network-group TAILSCALE_NETWORK {
            network 100.64.0.0/10
        }
        network-group LAB_NETWORKS {
            network 10.10.0.0/16
        }
        network-group LAB_PROVISIONING {
            network 10.10.20.0/24
        }
        network-group RFC1918 {
            network 10.0.0.0/8
            network 172.16.0.0/12
            network 192.168.0.0/16
        }
    }
    interface eth0 {
        in {
            name WAN_TO_LAB
        }
        local {
            name LOCAL
        }
        out {
            name LAB_TO_WAN
        }
    }
    ipv4 {
        name LAB_TO_WAN {
            default-action accept
            rule 10 {
                action accept
                description "Allow established/related"
                state {
                    established
                    related
                }
            }
            rule 20 {
                action drop
                description "Block new connections to home network"
                destination {
                    group {
                        network-group HOME_NETWORK
                    }
                }
                state {
                    new
                }
            }
        }
        name LOCAL {
            default-action drop
            rule 10 {
                action accept
                state {
                    established
                    related
                }
            }
            rule 20 {
                action accept
                description "Allow ICMP"
                protocol icmp
            }
            rule 30 {
                action accept
                description "Allow SSH from lab"
                destination {
                    port 22
                }
                protocol tcp
                source {
                    group {
                        network-group LAB_NETWORKS
                    }
                }
            }
            rule 31 {
                action accept
                description "Allow SSH from home"
                destination {
                    port 22
                }
                protocol tcp
                source {
                    group {
                        network-group HOME_NETWORK
                    }
                }
            }
            rule 40 {
                action accept
                description "Allow DNS from lab"
                destination {
                    port 53
                }
                protocol udp
                source {
                    group {
                        network-group LAB_NETWORKS
                    }
                }
            }
            rule 41 {
                action accept
                description "Allow TCP DNS from lab"
                destination {
                    port 53
                }
                protocol tcp
                source {
                    group {
                        network-group LAB_NETWORKS
                    }
                }
            }
            rule 42 {
                action accept
                description "Allow DNS from home"
                destination {
                    port 53
                }
                protocol udp
                source {
                    group {
                        network-group HOME_NETWORK
                    }
                }
            }
            rule 43 {
                action accept
                description "Allow TCP DNS from home"
                destination {
                    port 53
                }
                protocol tcp
                source {
                    group {
                        network-group HOME_NETWORK
                    }
                }
            }
            rule 44 {
                action accept
                description "Allow DNS from Tailscale"
                destination {
                    port 53
                }
                protocol udp
                source {
                    group {
                        network-group TAILSCALE_NETWORK
                    }
                }
            }
            rule 45 {
                action accept
                description "Allow TCP DNS from Tailscale"
                destination {
                    port 53
                }
                protocol tcp
                source {
                    group {
                        network-group TAILSCALE_NETWORK
                    }
                }
            }
            rule 50 {
                action accept
                description "Allow DHCP from lab"
                destination {
                    port 67
                }
                protocol udp
                source {
                    group {
                        network-group LAB_NETWORKS
                    }
                }
            }
            rule 52 {
                action accept
                description "Allow TFTP from LAB_PROV"
                destination {
                    port 69
                }
                protocol udp
                source {
                    group {
                        network-group LAB_PROVISIONING
                    }
                }
            }
            rule 53 {
                action accept
                description "Allow syslog from LAB_PROV"
                destination {
                    port 514
                }
                protocol udp
                source {
                    group {
                        network-group LAB_PROVISIONING
                    }
                }
            }
            rule 54 {
                action accept
                description "Allow Tinkerbell HTTP from LAB_PROV"
                destination {
                    port 7080
                }
                protocol tcp
                source {
                    group {
                        network-group LAB_PROVISIONING
                    }
                }
            }
            rule 55 {
                action accept
                description "Allow HookOS artifacts from LAB_PROV"
                destination {
                    port 7173
                }
                protocol tcp
                source {
                    group {
                        network-group LAB_PROVISIONING
                    }
                }
            }
            rule 56 {
                action accept
                description "Allow IncusOS artifacts from LAB_PROV"
                destination {
                    port 18080
                }
                protocol tcp
                source {
                    group {
                        network-group LAB_PROVISIONING
                    }
                }
            }
            rule 57 {
                action accept
                description "Allow Tinkerbell gRPC from LAB_PROV"
                destination {
                    port 42113
                }
                protocol tcp
                source {
                    group {
                        network-group LAB_PROVISIONING
                    }
                }
            }
            rule 58 {
                action accept
                description "Allow Tinkerbell SSH from LAB_PROV"
                destination {
                    port 2222
                }
                protocol tcp
                source {
                    group {
                        network-group LAB_PROVISIONING
                    }
                }
            }
            rule 60 {
                action accept
                description "Allow BGP from lab"
                destination {
                    port 179
                }
                protocol tcp
                source {
                    group {
                        network-group LAB_NETWORKS
                    }
                }
            }
        }
        name WAN_TO_LAB {
            default-action drop
            rule 10 {
                action accept
                description "Allow established/related"
                state {
                    established
                    related
                }
            }
            rule 20 {
                action accept
                description "Allow from home network"
                source {
                    group {
                        network-group HOME_NETWORK
                    }
                }
            }
        }
    }
}
container {
    name pdns-auth {
        allow-host-networks
        capability net-bind-service
        description "PowerDNS authoritative service for lab.gilman.io"
        image docker.io/powerdns/pdns-auth-50:5.0.3
        memory 256
        restart always
        volume conf {
            destination /etc/powerdns/pdns.conf
            source /config/containers/pdns-auth/pdns.conf
        }
        volume data {
            destination /var/lib/powerdns
            source /config/containers/pdns-auth/data
        }
    }
    name coredns-glab-lol {
        allow-host-networks
        arguments "-conf /etc/coredns/Corefile"
        capability net-bind-service
        description "CoreDNS authoritative service for mirrored glab.lol"
        image docker.io/coredns/coredns:1.13.1
        memory 128
        restart always
        volume conf {
            destination /etc/coredns/Corefile
            source /config/containers/coredns/Corefile
        }
        volume zones {
            destination /zones
            source /config/containers/coredns/zones
        }
    }
    name incusos-artifacts {
        allow-host-networks
        arguments "python -m http.server 18080 --bind 10.10.20.1 --directory /srv/incusos"
        description "IncusOS operation image artifact server"
        image docker.io/python:3.13.7-alpine3.22
        memory 128
        restart always
        volume artifacts {
            destination /srv/incusos
            source /config/containers/incusos-artifacts
        }
    }
    name tailscale {
        allow-host-networks
        capability net-admin
        capability net-raw
        description "Tailscale subnet router for home and lab networks"
        device tun {
            destination /dev/net/tun
            source /dev/net/tun
        }
        environment TS_AUTHKEY {
            value "__TAILSCALE_AUTHKEY__"
        }
        environment TS_AUTH_ONCE {
            value "true"
        }
        environment TS_EXTRA_ARGS {
            value "--advertise-tags=tag:subnet-router --accept-routes --snat-subnet-routes=false"
        }
        environment TS_HOSTNAME {
            value glab-vyos-subnet-router
        }
        environment TS_ROUTES {
            value "10.10.0.0/16,192.168.1.0/24,192.168.2.0/24"
        }
        environment TS_STATE_DIR {
            value /var/lib/tailscale
        }
        environment TS_USERSPACE {
            value "false"
        }
        image docker.io/tailscale/tailscale:v1.96.5
        memory 256
        restart always
        volume state {
            destination /var/lib/tailscale
            source /config/containers/tailscale/state
        }
    }
}
interfaces {
    /* Bridge for VLAN 10 - allows UM760 (eth2) to join management/platform
     * Both eth1.10 (switch trunk) and eth2.10 (UM760) are bridge members
     * The gateway IP lives on the bridge, not the individual interfaces
     */
    bridge br10 {
        address 10.10.10.1/24
        address 10.10.10.53/32
        address 10.10.10.54/32
        description "LAB_MGMT - Management + Platform"
        member {
            interface eth1.10 {
            }
            interface eth2.10 {
            }
        }
    }
    /* Bridge for VLAN 20 - Tinkerbell provisioning anchor.
     * eth1.20 is permanent; physical eth2 is added only during UM760 PXE.
     */
    bridge br20 {
        address 10.10.20.1/24
        description "LAB_PROV - Provisioning (PXE)"
        member {
            interface eth1.20 {
            }
        }
    }
    ethernet eth0 {
        address 10.0.0.2/30
        description "WAN - Transit to Home (CCR2004)"
    }
    ethernet eth1 {
        description "TRUNK - Lab Switch (CRS)"
        vif 10 {
            description "LAB_MGMT - Bridge member (br10)"
        }
        vif 20 {
            description "LAB_PROV - Bridge member (br20)"
        }
        vif 40 {
            address 10.10.40.1/24
            description "LAB_WORKLOAD - Workload / VM Network"
        }
    }
    ethernet eth2 {
        description "LAN - UM760 Management + Platform Uplink"
        vif 10 {
            description "LAB_MGMT - Bridge member (br10)"
        }
    }
    ethernet eth5 {
        address 10.10.70.1/24
        description "LAB_OOB - MS-02 AMT access switch"
    }
}
nat {
    source {
        rule 100 {
            outbound-interface {
                name eth0
            }
            source {
                address 10.10.0.0/16
            }
            translation {
                address masquerade
            }
        }
    }
}
protocols {
    bgp {
        address-family {
            ipv4-unicast {
            }
        }
        /* Keep future platform peers scaffolded but activate only the
         * current single-node platform cluster:
         *   delete protocols bgp neighbor 10.10.10.10 shutdown
         */
        neighbor 10.10.10.10 {
            address-family {
                ipv4-unicast {
                }
            }
            description "platform-cp-1 (UM760)"
            remote-as 64513
        }
        neighbor 10.10.10.11 {
            address-family {
                ipv4-unicast {
                }
            }
            description "platform-cp-2"
            remote-as 64513
            shutdown
        }
        neighbor 10.10.10.12 {
            address-family {
                ipv4-unicast {
                }
            }
            description "platform-cp-3"
            remote-as 64513
            shutdown
        }
        parameters {
            bestpath {
                as-path {
                    multipath-relax
                }
            }
            router-id 10.10.10.1
        }
        system-as 64512
    }
    static {
        route 0.0.0.0/0 {
            description "Default route via CCR2004"
            next-hop 10.0.0.1 {
            }
        }
        route 192.168.1.0/24 {
            description "Home network via CCR2004"
            next-hop 10.0.0.1 {
            }
        }
    }
}
service {
    dhcp-server {
        listen-address 10.10.10.1
        listen-address 10.10.70.1
        dynamic-dns-update {
            enable
            conflict-resolution enable
            generated-prefix dhcp
            override-client-update enable
            override-no-update enable
            qualifying-suffix dhcp.lab.gilman.io
            replace-client-name when-not-present
            send-updates enable
            tsig-key vyos-dhcp {
                algorithm hmac-sha256
                secret "__VYOS_DHCP_TSIG_SECRET__"
            }
            forward-domain dhcp.lab.gilman.io {
                dns-server 1 {
                    address 10.10.10.53
                    port 53
                }
                key-name vyos-dhcp
            }
            reverse-domain 10.10.10.in-addr.arpa {
                dns-server 1 {
                    address 10.10.10.53
                    port 53
                }
                key-name vyos-dhcp
            }
            reverse-domain 70.10.10.in-addr.arpa {
                dns-server 1 {
                    address 10.10.10.53
                    port 53
                }
                key-name vyos-dhcp
            }
        }
        shared-network-name LAB_MGMT {
            subnet 10.10.10.0/24 {
                lease 86400
                option {
                    default-router 10.10.10.1
                    name-server 10.10.10.1
                }
                range 0 {
                    start 10.10.10.200
                    stop 10.10.10.250
                }
                subnet-id 1
            }
        }
        shared-network-name LAB_OOB {
            subnet 10.10.70.0/24 {
                lease 86400
                option {
                    default-router 10.10.70.1
                    name-server 10.10.70.1
                }
                range 0 {
                    start 10.10.70.100
                    stop 10.10.70.199
                }
                static-mapping LAB01 {
                    ip-address 10.10.70.11
                    mac 38:05:25:35:48:86
                }
                static-mapping LAB02 {
                    ip-address 10.10.70.12
                    mac 38:05:25:35:4b:04
                }
                static-mapping LAB03 {
                    ip-address 10.10.70.13
                    mac 38:05:25:35:43:f0
                }
                subnet-id 2
            }
        }
    }
    dns {
        forwarding {
            allow-from 10.10.0.0/16
            allow-from 192.168.1.0/24
            allow-from 100.64.0.0/10
            domain 10.10.10.in-addr.arpa {
                name-server 10.10.10.53 {
                }
            }
            domain 70.10.10.in-addr.arpa {
                name-server 10.10.10.53 {
                }
            }
            domain glab.lol {
                name-server 10.10.10.54 {
                }
            }
            domain lab.gilman.io {
                name-server 10.10.10.53 {
                }
            }
            listen-address 10.10.10.1
            listen-address 10.10.20.1
            listen-address 10.10.40.1
            listen-address 10.10.70.1
            system
        }
    }
    ssh {
        disable-password-authentication
        port 22
    }
}
system {
    domain-name lab.gilman.io
    host-name gateway
    login {
        /* User authentication managed separately via Ansible
         * Do not commit passwords or keys to this file
         * Ansible adds SSH keys and optionally sets password
         * Console access requires password set via:
         *   set system login user vyos authentication plaintext-password <pw>
         */
        user vyos {
            authentication {
                /* SSH public keys added by Ansible deploy.yml */
                /* Password set manually for console access */
            }
        }
    }
    name-server 1.1.1.1
    name-server 8.8.8.8
    ntp {
        server time.cloudflare.com {
        }
    }
    task-scheduler {
        task dns-mirror-fetch-glab-lol {
            executable {
                path /config/scripts/dns-mirror-fetch-glab-lol.sh
            }
            interval 1m
        }
    }
    time-zone America/Los_Angeles
}
