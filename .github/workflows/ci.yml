name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-setup: true
          cache-base: ${{ github.event.repository.default_branch }}

      - name: Create virtual environment
        run: |
          python3 -m venv .venv
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"

      - name: Install infrastructure validation dependencies
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/network/vyos/ansible.cfg
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r network/vyos/requirements.txt
          ansible-galaxy collection install \
            -r network/vyos/collections/requirements.yml \
            -p network/vyos/.ansible/collections

      - name: Run Moon CI
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/network/vyos/ansible.cfg
        run: moon ci --summary minimal
